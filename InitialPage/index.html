<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrashIn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Roboto+Slab:wght@400;500;600;700&display=swap" 
rel="stylesheet">
  <link rel="stylesheet" href="style.css" >
</head>
<body>
  

    <header class="navbar">

        <div class="logo">
            TrashIn
        </div>

        <nav>
            <ul class="nav-links">

                <li>
                    <a href="quem-somos.html">Quem Somos?</a>
                </li>

                <li>
                    <a href="objetivos.html">Objetivos</a>
                </li>

                <li>
                    <a href="funcionalidades.html">Funcionalidades</a>
                </li>

                <li>
                    <a href="#" class="active">
                        Login
                    </a>
                </li>

            </ul>
        </nav>

    </header>

    <main class="login-section">

        <div class="login-container">

            <h1>Login</h1>

            <p>
                Para uma melhor experiência e acesso a conteúdos personalizados,
                realize seu login.
            </p>

            <form>

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        placeholder="Digite seu email"
                    >

                </div>

                <div class="input-group">

                    <label>Senha</label>

                    <input
                        type="password"
                        placeholder="Digite sua senha"
                    >

                </div>

                <div class="actions">

                    <a href="cadastro.html" class="register-link">
                        Criar conta
                    </a>

                    <button
                     type="button"
                     onclick="window.location.href='pontos-descarte.html'">

                     Entrar

                    </button>

                </div>

            </form>

        </div>

    </main>

    <div class="wave"></div>



  <script src="app.js"></script>
  
</body>
</html>
