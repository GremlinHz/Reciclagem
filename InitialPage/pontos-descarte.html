<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<title>Pontos de Descarte</title>

</head>

<body>

<header class="navbar dashboard-navbar">

    <div class="logo">
        TrashIn
    </div>

    <nav class="dashboard-nav">

        <ul class="nav-links">

            <li>
                <a href="pontos-descarte.html" class="active">
                    Pontos de Descarte
                </a>
            </li>

            <li>
                <a href="ranking.html">
                    Ranking
                </a>
            </li>
            <li>
                <a href="index.html" class="logout-btn">
                    Sair
                </a>
            </li>

        </ul>

    </nav>

</header>

<main class="dashboard">

    <aside class="sidebar-left">

        <h2>Material para descarte</h2>

        <select>

            <option>Vidro</option>
            <option>Plástico</option>
            <option>Papel de Figurinha</option>
            <option>Isopor</option>
            <option>Óleo</option>
            <option>Papel</option>
            <option>Metal</option>

        </select>

    </aside>

    <section class="map-container">

        <div class="map-placeholder">

            MAPA INTERATIVO

        </div>

    </section>

    <aside class="sidebar-right">

        <h2>Localização</h2>

        <div class="input-group">

            <label>Estado</label>
            <input type="text">

        </div>

        <div class="input-group">

            <label>Cidade</label>
            <input type="text">

        </div>

        <div class="input-group">

            <label>CEP</label>

            <input type="text">

            <small>
                Opcional. Informe o CEP para encontrarmos pontos mais próximos da sua localização.
            </small>

        </div>

        <button>
            Buscar Pontos
        </button>

    </aside>

</main>

</body>
</html>
