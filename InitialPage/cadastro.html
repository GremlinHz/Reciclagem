<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="style.css"><title>Cadastro | TrashIn</title></head><body><header class="navbar"><div class="logo">
    TrashIn
</div>

<nav>

    <ul class="nav-links">

        <li><a href="quem-somos.html">Quem Somos?</a></li>
        <li><a href="objetivos.html">Objetivos</a></li>
        <li><a href="funcionalidades.html">Funcionalidades</a></li>
        <li><a href="index.html">Login</a></li>

    </ul>

</nav>

</header><section class="register-section"><div class="register-card">

    <h1>Criar Conta</h1>

    <p>
        Faça seu cadastro para participar da rede de descarte
        e reaproveitamento de materiais.
    </p>

    <form id="cadastroForm">

        <div class="input-group">

            <label>Nome Completo</label>

            <input
                type="text"
                placeholder="Digite seu nome completo"
                required>

        </div>

        <div class="input-group">

            <label>E-mail</label>

            <input
                type="email"
                placeholder="Digite seu e-mail"
                required>

        </div>

        <div class="input-group">

            <label>Senha</label>

            <input
                type="password"
                placeholder="Crie uma senha"
                required>

        </div>

       <div class="input-group">

    <label>Estado</label>

    <input
        type="text"
        id="estado"
        placeholder="Ex: Piauí"
        required>

</div>

    <div class="input-group">

    <label>Cidade</label>

    <input
        type="text"
        id="cidade"
        placeholder="Ex: Teresina"
        required>

    </div>

        <div class="input-group">

            <label>Qual será sua função?</label>

            <select id="tipoUsuario">

               <option value="descartar">
                 Quero descartar materiais
               </option>

               <option value="receber">
                Quero receber materiais
               </option>

</select>

        </div>

        <button type="submit">
            Criar Conta
        </button>

    </form>

</div>
<script>

const form = document.getElementById("cadastroForm");
const tipoUsuario = document.getElementById("tipoUsuario");
const documento = document.getElementById("documento");

form.addEventListener("submit", function(event){

    if(
        tipoUsuario.value === "receber" &&
        documento.value.trim() === ""
    ){

        event.preventDefault();

        alert(
            "CPF ou CNPJ é obrigatório para quem recebe materiais."
        );

        documento.focus();
    }

});

</script>
</section></body></html>
