<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700;800&family=Roboto+Slab:wght@400;500;600;700&display=swap" rel="stylesheet">
 <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
<link rel="stylesheet" href="../style.css">

<title>Pontos de Descarte</title>

</head>

<body>

<header class="navbar dashboard-navbar">

    <div class="logo">
        TrashIn
    </div>

    <nav class="dashboard-nav">

        <ul class="nav-links">

            <li>
                <a href="../pontosColeta/pontos_coleta.html" class="active">
                    Pontos de coleta
                </a>
            </li>

            <li>
                <a href="../ranking/ranking.html">
                    Ranking
                </a>
            </li>
            <li>
                <a href="../index.html" class="logout-btn">
                    Sair
                </a>
            </li>

        </ul>

    </nav>

</header>

<main class="dashboard">

    <aside class="sidebar-left">

        <h2>Material para descarte</h2>

        <select>

            <option>Vidro</option>
            <option>Plástico</option>
            <option>Papel de Figurinha</option>
            <option>Isopor</option>
            <option>Óleo</option>
            <option>Papel</option>
            <option>Metal</option>

        </select>

    </aside>

    <section class="map-container">

        <div class="map-placeholder" id="map">

            MAPA INTERATIVO

        </div>

    </section>

    <aside class="sidebar-right">
        <form class="form">
            <h2>Localização</h2>
    
            <div class="input-group">
    
                <label>Estado</label>
                <input type="text" name="estado">
    
            </div>
    
            <div class="input-group">
    
                <label>Cidade</label>
                <input type="text" name="city">
    
            </div>
    
            <div class="input-group">
    
                <label>CEP</label>
    
                <input name="cep" type="text">
    
                <small>
                    Opcional. Informe o CEP para encontrarmos pontos mais próximos da sua localização.
                </small>
    
            </div>
    
            <button type="submit">
                Buscar Pontos
            </button>
        </form>


    </aside>

</main>

 <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
 <script src="pontos_coleta.js"></script>
</body>
</html>
