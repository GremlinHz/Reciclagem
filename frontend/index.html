<h1>Home</h1>

<div id="user"></div>

<button onclick="logout()">Sair</button>

<script>
const user = JSON.parse(localStorage.getItem("user"));

if (!user) {
  window.location.href = "/login/login.html";
}

document.querySelector("#user").innerHTML =
  "Bem-vindo " + user.nome;

function logout() {
  localStorage.removeItem("user");
  window.location.href = "/login/login.html";
}
</script>
