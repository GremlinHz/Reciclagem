</header><section class="register-section"><div class="register-card">

    <h1>Criar Conta</h1>

    <p>
        Faça seu cadastro para participar da rede de descarte
        e reaproveitamento de materiais.
    </p>

    <form id="cadastroForm">

        <div class="input-group">

            <label>Nome Completo</label>

            <input
                type="text"
                placeholder="Digite seu nome completo"
                required 
                name="nome">

        </div>

        <div class="input-group">

            <label>E-mail</label>

            <input
                type="email"
                placeholder="Digite seu e-mail"
                required
                name="email">

        </div>

        <div class="input-group">

            <label>Senha</label>

            <input
                type="password"
                placeholder="Crie uma senha"
                required
                name="senha">

        </div>

       <div class="input-group">

    <label>Estado</label>

    <input
        type="text"
        id="estado"
        placeholder="Ex: Piauí"
        required
        name="estado">

</div>

    <div class="input-group">

    <label>Cidade</label>

    <input
        type="text"
        id="cidade"
        placeholder="Ex: Teresina"
        required
        name="cidade">

    </div>

        <div class="input-group">

            <label>Qual será sua função?</label>

            <select name="select" id="tipoUsuario">

               <option value="descartar">
                 Quero descartar materiais
               </option>

               <option value="receber">
                Quero receber materiais
               </option>

</select>

        </div>

        <button type="submit">
            Criar Conta
        </button>

    </form>

</div>
<script src="cadastro.js"></script>
</section></body></html>
