<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TrashIn</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>
  

    <header class="navbar">

        <div class="logo">
            TrashIn
        </div>

        <nav>
            <ul class="nav-links">

                <li>
                    <a href="../index.html">Quem Somos?</a>
                </li>

                <li>
                    <a href="../objetivos/objetivos.html">Objetivos</a>
                </li>

                <li>
                    <a href="../funcionalidades/funcionalidades.html">Funcionalidades</a>
                </li>

                <li>
                    <a href="../login/login.html" class="active">
                        Login
                    </a>
                </li>

            </ul>
        </nav>
    </header>

    <main class="login-section">

        <div class="login-container">

            <h1>Login</h1>

            <p>
                Para uma melhor experiência e acesso a conteúdos personalizados,
                realize seu login.
            </p>

            <form class="form">

                <div class="input-group">

                    <label>Email</label>

                    <input
                        type="email"
                        placeholder="Digite seu email"
                        id="email"
                        required
                    >

                </div>

                <div class="input-group">

                    <label>Senha</label>

                    <input
                        type="password"
                        placeholder="Digite sua senha"
                        id="senha"
                        required
                    >

                </div>

                <div class="actions">

                    <a href="../cadastro/cadastro.html" class="register-link">
                        Criar conta
                    </a>

                    <button
                     type="submit">
                     Entrar

                    </button>

                </div>

            </form>

        </div>

    </main>

    <div class="wave"></div>



  <script src="login.js"></script>
  
</body>
</html>
